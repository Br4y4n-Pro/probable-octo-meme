# Fly.io app config for Batalla Naval.
# Same-origin deploy: this single VM serves the API, WebSockets, and the
# static React bundle.
#
# IMPORTANT: change `app` below to a globally-unique name on Fly.io (e.g.
# `bn-yourname`). `fly launch` will overwrite it interactively if you prefer.

app = "battlenaval-CHANGEME"
primary_region = "mia"  # Miami — closer to Colombia/LatAm. Try "scl" (Santiago) or "sjc" (San Jose) too.

[build]

[env]
  # Where scores.ts persists data — matches the mounts destination below.
  DATA_DIR = "/data"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  # Scale down to zero when no players are online; first hit takes ~2s to wake.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

# Persistent volume for the leaderboard JSON. Survives redeploys and restarts.
# Create it once before the first deploy:
#   fly volumes create scores_data --size 1 --region mia
[mounts]
  source = "scores_data"
  destination = "/data"
